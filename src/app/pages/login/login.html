<main class="auth-page">
  <section class="auth-card">
    <div class="auth-brand">
      <img src="full_logo.png" alt="FileEncrypter" />
    </div>
    <!-- <p>login works!</p>

<button (click)="testLogin()">Test Login</button>

<button (click)="Logout()">Logout</button> -->

    <h1>Login</h1>
    <form>
      <input [(ngModel)]="email" name="email" type="text" placeholder="Email">
      <input [(ngModel)]="password" name="password" type="password" placeholder="Password">
      <button type="button" (click)="Login()">Login</button>
    </form>

    @if (errorMessage) {
      <p class="error-message">{{ errorMessage }}</p>
    }

    <p class="auth-switch">Don't have an account? <a routerLink="/register">click here</a> to register.</p>
  </section>
</main>
