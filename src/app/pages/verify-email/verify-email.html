<main class="auth-page">
  <section class="auth-card">
    <div class="auth-brand">
      <img src="full_logo.png" alt="FileEncrypter" />
    </div>
    <!-- <p>verify-email works!</p>

<button (click)="verify()">Verify</button> -->

    <h1>Verify Your Email</h1>

    <form>
      <input [(ngModel)]="email" type="email" name="email" placeholder="Email">
      <input [(ngModel)]="otp" type="string" name="otp" placeholder="OTP">
      <button (click)="verify()" type="button">Verify</button>
    </form>

    @if (errorMessage) {
      <p class="error-message">{{ errorMessage }}</p>
    }
  </section>
</main>
