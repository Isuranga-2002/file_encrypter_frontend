<h2>My Files</h2>

<p>Total Files: {{ files.length }}</p>

<table border="1">
  <thead>
    <tr>
      <th>File Name</th>
      <th>Status</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let file of files">
      <td>{{ file.fileName }}</td>
      <td>{{ file.status }}</td>
      <td>

        @if (file.status === 'COMPLETED') {

          <button
            (click)="downloadFile(file.jobId)"
          >
            Download
          </button>

        } @else {

          Processing...

        }

      </td>
    </tr>
  </tbody>
</table>
