<main class="app-page upload-page">
  <section class="panel upload-panel">
    <h1>Upload PDF</h1>

    <div class="form-stack">
      <input type="file" accept=".pdf" (change)="onFileSelected($event)">

      <input type="password" [(ngModel)]="password" placeholder="Encryption Password">

      <button (click)="upload()">Encrypt PDF</button>
    </div>
  </section>
</main>
